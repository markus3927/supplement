<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1565C0">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Supplemente">
<title>Supplemente v19 — Bioenergetische Frequenzarbeit</title>
<style>
  :root {
    --royal:    #1565C0;
    --dunkel:   #0D3E6A;
    --hellblau: #D6E8F7;
    --akzent:   #42A5F5;
    --weiss:    #FFFFFF;
    --grau:     #F5F8FB;
    --text:     #2C2C2C;
    --gruen:    #2E9E5B;
    --gruen-bg: #E6F6EC;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--grau);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    text-align: center;
  }

  /* ─── HEADER (1:1 aus Mangelanalyse) ─── */
  header {
    text-align: center;
    background: var(--royal);
    color: var(--weiss);
    padding: 0.9rem 1rem 0.5rem;
    box-shadow: 0 2px 10px rgba(13,62,106,0.28);
    position: sticky; top: 0; z-index: 100;
    overflow: hidden;
  }
  header::before {
    content:''; position:absolute; top:-180px; right:-180px;
    width:360px; height:360px; border-radius:50%;
    border:1px solid #0D47A1; opacity:0.6; pointer-events:none;
  }
  header .top { position:relative; z-index:2; display:flex; align-items:center; justify-content:center; gap:0.8rem; }
  header .logo { width:52px; height:52px; display:block; flex-shrink:0; }
  header .brand .praxis { font-size:0.95rem; font-weight:700; margin:0; letter-spacing:0.3px;
    text-shadow:0 1px 0 rgba(0,0,0,0.35); }
  header .brand .inhaber { font-size:0.72rem; margin:0.05rem 0; opacity:0.92; }
  header .brand .titel { font-size:1.15rem; font-weight:700; margin:0.15rem 0 0;
    text-shadow:0 2px 2px rgba(0,0,0,0.4); }
  header .accent { position:relative; z-index:2; height:3px; background:var(--akzent);
    margin:0.55rem -1rem 0; box-shadow:0 3px 0 #64B5F6; }

  main { max-width:620px; margin:0 auto; padding:1rem 0.9rem 4rem; }

  /* ─── TABS ─── */
  .tabs { display:flex; gap:0.4rem; margin:0.2rem 0 1rem; }
  .tab { flex:1; text-align:center; padding:0.6rem 0.3rem; border-radius:10px;
    background:var(--weiss); border:1px solid #cdd9e6; color:var(--dunkel);
    font-size:0.9rem; font-weight:700; cursor:pointer; user-select:none; }
  .tab.active { background:var(--royal); color:#fff; border-color:var(--royal); }

  /* ─── HEUTE ─── */
  .datum { font-size:0.85rem; color:#4a5b70; margin:0 0 0.7rem; text-transform:capitalize; }
  .progress-wrap { background:var(--weiss); border:1px solid #d9e5f2; border-radius:12px; padding:0.8rem 1rem; margin-bottom:1.2rem; }
  .progress-top { display:flex; flex-direction:column; align-items:center; margin-bottom:0.55rem; }
  .progress-top .zahl { font-size:1.05rem; font-weight:800; color:var(--dunkel); }
  .progress-top .lbl { font-size:0.8rem; color:#6a7a8c; margin-top:0.1rem; }
  .bar { height:10px; background:#E4ECF5; border-radius:99px; overflow:hidden; }
  .bar > span { display:block; height:100%; background:linear-gradient(90deg,var(--royal),var(--akzent)); border-radius:99px; transition:width .35s ease; }
  .alldone { margin-top:0.6rem; font-size:0.85rem; color:var(--gruen); font-weight:700; }

  .slot { margin-bottom:1.2rem; }
  .slot-head { display:flex; align-items:center; justify-content:center; gap:0.45rem; margin:0 0 0.5rem; }
  .slot-head .ic { font-size:1.15rem; }
  .slot-head .name { font-size:1rem; font-weight:800; color:var(--dunkel); }
  .slot-head .hint { font-size:0.72rem; color:#8494a4; }

  .item { position:relative; background:var(--weiss); border:1.5px solid #d9e5f2; border-radius:14px;
    padding:0.85rem 1rem; margin-bottom:0.55rem; cursor:pointer; transition:background .15s, border-color .15s; }
  .item:active { background:#f0f6fc; }
  .item .check { position:absolute; top:10px; right:10px; width:24px; height:24px; border-radius:50%;
    border:2px solid #c3d3e3; display:flex; align-items:center; justify-content:center; font-size:0.85rem; color:#fff; transition:.15s; }
  .item .nm { font-weight:700; color:var(--text); font-size:1rem; }
  .item .ds { font-size:0.83rem; color:#6a7a8c; margin-top:0.05rem; }
  .item .nt { font-size:0.78rem; color:#8494a4; font-style:italic; margin-top:0.15rem; }
  .item.done { border-color:var(--gruen); background:var(--gruen-bg); }
  .item.done .check { background:var(--gruen); border-color:var(--gruen); }
  .item.done .nm { text-decoration:line-through; color:#7a8a7e; }
  .warn { display:flex; align-items:flex-start; gap:0.5rem; background:#FFF6E5; border:1px solid #F1D08A;
    border-left:4px solid #E8A400; border-radius:14px; padding:0.6rem 0.8rem; margin:0 0 0.55rem;
    font-size:0.82rem; color:#6b4e00; line-height:1.4; }
  .warn .wic { font-size:1rem; line-height:1.2; }
  .warn b { color:#8a4b00; font-weight:800; }
  .warn .wtx { display:block; margin-top:0.12rem; color:#7a5e10; font-weight:600; }

  .mini-actions { margin-top:0.5rem; }
  .reset-day { font-size:0.78rem; color:#9aa7b5; background:none; border:none; cursor:pointer; text-decoration:underline; padding:0.3rem 0; }

  .empty { padding:2.5rem 1rem; color:#7a8a99; }
  .empty .big { font-size:2.2rem; margin-bottom:0.4rem; }
  .empty p { margin:0.3rem 0 1rem; font-size:0.9rem; }

  /* ─── PLAN ─── */
  .plan-intro { font-size:0.86rem; color:#4a5b70; margin:0 0 0.9rem; }
  .plan-item { background:var(--weiss); border:1px solid #d9e5f2; border-radius:12px; padding:0.8rem 0.85rem; margin-bottom:0.6rem; }
  .plan-item .pi-name { font-weight:700; color:var(--dunkel); font-size:0.98rem; }
  .plan-item .pi-dose { font-size:0.83rem; color:#6a7a8c; }
  .plan-item .pi-slots { margin-top:0.4rem; display:flex; flex-wrap:wrap; gap:0.3rem; justify-content:center; }
  .pi-slot { font-size:0.72rem; font-weight:700; color:var(--royal); background:var(--hellblau); border-radius:99px; padding:0.12rem 0.6rem; }
  .plan-item .pi-note { font-size:0.79rem; color:#8494a4; font-style:italic; margin-top:0.4rem; }
  .pi-edit { margin-top:0.6rem; background:none; border:1px solid #cdd9e6; border-radius:8px; color:var(--royal); font-size:0.82rem; font-weight:700; padding:0.4rem 1.1rem; cursor:pointer; }
  .add-btn { width:100%; padding:0.85rem; border-radius:12px; border:2px dashed var(--akzent); background:#eef6fd; color:var(--royal); font-size:0.95rem; font-weight:800; cursor:pointer; margin-top:0.3rem; }

  /* ─── FORM ─── */
  .form { background:var(--weiss); border:1.5px solid var(--royal); border-radius:14px; padding:1rem; margin-bottom:1rem; }
  .form h3 { margin:0 0 0.8rem; color:var(--dunkel); font-size:1.05rem; }
  .field { margin-bottom:0.8rem; }
  .field label { display:block; font-size:0.78rem; font-weight:700; color:var(--dunkel); margin-bottom:0.3rem; }
  .field input { width:100%; padding:0.6rem 0.7rem; border:1px solid #cdd9e6; border-radius:10px; font-size:0.95rem; font-family:inherit; color:var(--text); text-align:center; }
  .field input:focus { outline:none; border-color:var(--akzent); }
  .slot-pick { display:flex; gap:0.4rem; flex-wrap:wrap; justify-content:center; }
  .slot-opt { flex:1; min-width:70px; text-align:center; padding:0.55rem 0.3rem; border-radius:10px; border:1.5px solid #cdd9e6; background:var(--weiss); font-size:0.85rem; font-weight:700; color:var(--dunkel); cursor:pointer; user-select:none; }
  .slot-opt.on { background:var(--royal); color:#fff; border-color:var(--royal); }
  .form-actions { display:flex; gap:0.4rem; margin-top:0.5rem; }
  .btn { flex:1 1 0; min-width:0; padding:0.42rem 0.3rem; border-radius:8px; border:none; font-size:0.76rem; font-weight:700; cursor:pointer; white-space:nowrap; }
  .btn.save { background:var(--royal); color:#fff; }
  .btn.cancel { background:#eef2f6; color:#5a6b7c; }
  .btn.del { background:#FDECEC; color:#C0392B; }

  /* ─── VERLAUF ─── */
  .verlauf-intro { font-size:0.86rem; color:#4a5b70; margin:0 0 0.9rem; }
  .vrow { display:flex; align-items:center; gap:0.7rem; background:var(--weiss); border:1px solid #d9e5f2; border-radius:10px; padding:0.55rem 0.75rem; margin-bottom:0.4rem; }
  .vrow .vday { width:104px; flex-shrink:0; font-size:0.82rem; color:var(--dunkel); font-weight:600; text-align:left; }
  .vrow .vday.heute { color:var(--royal); font-weight:800; }
  .vrow .vbar { flex:1; height:9px; background:#E4ECF5; border-radius:99px; overflow:hidden; }
  .vrow .vbar > span { display:block; height:100%; background:linear-gradient(90deg,var(--royal),var(--akzent)); }
  .vrow .vbar.full > span { background:var(--gruen); }
  .vrow .vnum { width:46px; text-align:right; font-size:0.78rem; color:#6a7a8c; flex-shrink:0; }

  footer { font-size:0.68rem; color:#9aa7b5; padding:1.4rem 1rem 0; line-height:1.5; }

  /* ─── ANALYSE ─── */
  .a-note{ background:#FFF6E5;border:1px solid #F1D08A;color:#7a5e10;border-radius:10px;padding:0.6rem 0.7rem;font-size:0.82rem;font-weight:600;margin-bottom:0.9rem;line-height:1.4; }
  .a-sec{ background:var(--weiss);border:1.5px solid var(--hellblau);border-radius:14px;padding:0.8rem 0.9rem;margin-bottom:1rem; }
  .a-h{ font-weight:800;color:var(--royal);font-size:0.92rem;margin-bottom:0.6rem; }
  .a-sub{ font-size:0.8rem;color:#5a6b7a;margin-bottom:0.5rem;line-height:1.35; }
  .a-chips{ display:flex;flex-wrap:wrap;gap:0.35rem; }
  .a-chip{ padding:0.4rem 0.7rem;border-radius:999px;border:1.5px solid var(--hellblau);background:#f4f9fe;color:var(--dunkel);font-size:0.82rem;font-weight:600;cursor:pointer; }
  .a-chip.sel{ background:var(--royal);color:#fff;border-color:var(--royal); }
  .bl-paste{ width:100%;border:1.5px solid var(--hellblau);border-radius:10px;padding:0.55rem 0.6rem;font-size:0.85rem;font-family:inherit;resize:vertical;box-sizing:border-box; }
  .a-btn-row{ display:flex;gap:0.4rem;margin:0.5rem 0 0.8rem; }
  .a-btn2{ flex:1;text-align:center;padding:0.55rem;border-radius:10px;border:1.5px solid var(--royal);background:#eef6fd;color:var(--royal);font-size:0.82rem;font-weight:700;cursor:pointer; }
  .a-btn2.file{ display:inline-flex;align-items:center;justify-content:center; }
  .blood-grid{ display:flex;flex-direction:column;gap:0.4rem; }
  .bl-row{ display:flex;align-items:center;gap:0.5rem; }
  .bl-lab{ flex:1;font-size:0.85rem;font-weight:600;color:var(--text); }
  .bl-in{ width:5.4rem;padding:0.4rem 0.5rem;border:1.5px solid var(--hellblau);border-radius:8px;font-size:0.9rem;text-align:right; }
  .bl-un{ width:3.8rem;font-size:0.76rem;color:#789; }
  .bl-hint{ font-size:0.74rem;color:#789;margin-top:0.5rem;line-height:1.35; }
  .bf{ display:flex;justify-content:space-between;align-items:center;padding:0.45rem 0.6rem;border-radius:9px;margin-bottom:0.35rem;font-size:0.86rem; }
  .bf-low{ background:#FFE9E5;border:1px solid #f0b3a8; } .bf-low .bf-tag{ color:#b23030;font-weight:800; }
  .bf-high{ background:#FFF1D6;border:1px solid #e8c886; } .bf-high .bf-tag{ color:#a86b00;font-weight:800; }
  .bf-ok{ background:var(--gruen-bg);border:1px solid #b7e3c6; } .bf-ok .bf-tag{ color:var(--gruen);font-weight:800; }
  .rec-slot{ margin-bottom:0.7rem; }
  .rec-slot-h{ font-weight:800;color:var(--dunkel);font-size:0.85rem;margin:0.3rem 0 0.35rem; }
  .rec{ background:#f4f9fe;border:1px solid var(--hellblau);border-radius:10px;padding:0.5rem 0.65rem;margin-bottom:0.35rem; }
  .rec-nm{ font-weight:800;color:var(--royal);font-size:0.92rem; }
  .rec-why{ font-size:0.78rem;color:#5a6b7a;margin-top:0.12rem; }
  .a-danger{ background:#FDE7E7;border:1.5px solid #E0A0A0;color:#9b1c1c;border-radius:12px;padding:0.7rem 0.8rem;font-size:0.85rem;font-weight:600;line-height:1.4;margin-bottom:0.8rem; }
  .a-danger b{ color:#8a1414; }
  .rec.flag{ border-color:#E0A0A0;background:#FDF3F3; }
  .rec-warn{ font-size:0.7rem;color:#fff;font-weight:800;background:#c0392b;border-radius:6px;padding:0.05rem 0.4rem;margin-left:0.3rem;white-space:nowrap; }
  .rec-warn2{ font-size:0.74rem;color:#9b1c1c;margin-top:0.2rem;font-weight:600; }
  .a-chip.med.sel{ background:#b23030;border-color:#b23030; }
  .pi-warn{ font-size:0.78rem;color:#b23030;font-weight:700;margin-top:0.35rem;line-height:1.35; }
  #printArea{ display:none; }
  @media print {
    body > *:not(#printArea){ display:none !important; }
    #printArea{ display:block !important; }
    @page{ margin:14mm; }
  }
  .bl-grp{ font-size:0.72rem;font-weight:800;color:#1565C0;text-transform:uppercase;letter-spacing:0.04em;margin:0.75rem 0 0.3rem; }
  .mode-kunde, .mode-ich{ padding:0.5rem 1rem; display:flex; align-items:center; gap:0.65rem; flex-wrap:wrap; }
  .mode-kunde{ background:#FFF4E6; border-bottom:1px solid #f0d9b5; }
  .mode-badge{ font-size:0.78rem; font-weight:800; color:#a8650c; }
  .mode-btn{ font-size:0.78rem; font-weight:700; color:#fff; background:#1565C0; border:none; border-radius:8px; padding:0.32rem 0.7rem; cursor:pointer; }
  .mode-link{ font-size:0.78rem; font-weight:600; color:#1565C0; text-decoration:underline; cursor:pointer; }
  .mode-ich{ justify-content:flex-end; }
  .mode-seg{ display:inline-flex; border:1px solid #1565C0; border-radius:8px; overflow:hidden; }
  .mode-seg .seg{ font-size:0.78rem; font-weight:700; padding:0.32rem 0.7rem; border:none; background:#fff; color:#1565C0; cursor:pointer; }
  .mode-seg .seg.on{ background:#1565C0; color:#fff; }
</style>
</head>

<script>
/* ═══ SPEICHER (localStorage mit Fallback) ═══ */
const KEY = 'supplemente_v1';
let memFallback = null;
function load(){
  try { const raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return memFallback; }
}
function save(){
  try { localStorage.setItem(KEY, JSON.stringify(state)); }
  catch(e){ memFallback = JSON.parse(JSON.stringify(state)); }
}

/* ═══ TAGESZEITEN ═══ */
const SLOTS = [
  { id:'morgen', label:'Morgen', ic:'🌅', hint:'nach dem Aufstehen' },
  { id:'mittag', label:'Mittag', ic:'☀️', hint:'zum Mittagessen' },
  { id:'abend',  label:'Abend',  ic:'🌇', hint:'zum Abendessen' },
  { id:'nacht',  label:'Nacht',  ic:'🌙', hint:'vor dem Schlafen' }
];
const SLOT_LABEL = Object.fromEntries(SLOTS.map(s=>[s.id,s.label]));

/* ═══ WECHSELWIRKUNGEN — im selben Zeitfenster zeitlich trennen ═══ */
const NUT_MATCH = [
  { key:'eisen',      rx:/eisen|ferro/i },
  { key:'magnesium',  rx:/magnesium/i },
  { key:'kalzium',    rx:/kalzium|calcium|kalk/i },
  { key:'zink',       rx:/zink|zinc/i },
  { key:'kupfer',     rx:/kupfer|copper/i },
  { key:'mangan',     rx:/mangan|manganese/i },
  { key:'molybdaen',  rx:/molybd/i },
  { key:'chrom',      rx:/chrom/i },
  { key:'selen',      rx:/selen/i },
  { key:'c',          rx:/vitamin[\s-]*c\b|ascorbin/i },
  { key:'e',          rx:/vitamin[\s-]*e\b|tocopherol/i },
  { key:'k',          rx:/vitamin[\s-]*k\d?\b|\bk2\b|\bmk-?7\b|menachinon|phyllochinon/i },
  { key:'omega3',     rx:/omega[\s-]*3|fisch[öo]l|algen[öo]l|\bepa\b|\bdha\b/i },
  { key:'ballast',    rx:/ballast|flohsamen|psyllium|inulin|pektin/i },
  { key:'arginin',    rx:/arginin/i },
  { key:'lysin',      rx:/lysin/i },
  { key:'biotin',     rx:/biotin|vitamin[\s-]*b7|vitamin[\s-]*h\b/i },
  { key:'alphalipon', rx:/alpha[\s-]*lipon|lipons[äa]ure|thioct/i },
  { key:'taurin',     rx:/taurin/i },
  { key:'koffein',    rx:/koffein|caffein|coffein|energy[\s-]*drink/i }
];
const CONFLICTS = {
  'eisen|magnesium':'hemmen sich gegenseitig bei der Aufnahme – mind. 2 Std. Abstand.',
  'eisen|kalzium':  'Kalzium hemmt die Eisenaufnahme stark – mind. 2 Std. Abstand.',
  'eisen|zink':     'konkurrieren um denselben Aufnahmeweg – zeitlich trennen.',
  'magnesium|zink': 'konkurrieren in hoher Dosis um die Aufnahme – zeitlich trennen.',
  'kalzium|zink':   'Kalzium hemmt die Zinkaufnahme – zeitlich trennen.',
  'kupfer|zink':    'Zink senkt Kupfer bei Dauereinnahme – zeitlich trennen, Verhältnis beachten.',
  'eisen|mangan':   'hemmen sich bei der Aufnahme – zeitlich trennen.',
  'kalzium|mangan': 'Kalzium hemmt die Mangan-Aufnahme – zeitlich trennen.',
  'chrom|kalzium':  'Kalzium hemmt die Chrom-Aufnahme – zeitlich trennen.',
  'kupfer|molybdaen':'sehr hohes Molybdän senkt Kupfer – Verhältnis beachten, zeitlich trennen.',
  'ballast|eisen':  'Ballaststoffe binden Eisen – Präparat 1–2 Std. davor/danach.',
  'ballast|zink':   'Ballaststoffe binden Zink – zeitlich trennen.',
  'ballast|kalzium':'Ballaststoffe binden Kalzium – zeitlich trennen.',
  'arginin|lysin':  'Gegenspieler bei der Aufnahme – nicht hochdosiert gemeinsam.',
  'c|kupfer':       'sehr hohe Vitamin-C-Dosen senken die Kupferaufnahme – etwas versetzt einnehmen.',
  'c|selen':        'hochdosiertes Vitamin C zeitlich von Selen trennen.',
  'e|k':            'hohe Vitamin-E-Dosen wirken gegen Vitamin K – zeitlich trennen.',
  'k|omega3':       'in hoher Dosis auf Blutungsneigung achten (v. a. mit Blutverdünnern).',
  'alphalipon|biotin':'Alpha-Liponsäure kann die Biotin-Verwertung stören – zeitlich trennen / Biotin ergänzen.',
  'koffein|taurin': 'zusammen können Herzklopfen und Unruhe fördern.'
};
function nutKeysOf(name){ return NUT_MATCH.filter(m=>m.rx.test(name||'')).map(m=>m.key); }
function conflictNote(k1,k2){ return CONFLICTS[[k1,k2].sort().join('|')] || null; }
function slotConflicts(items){
  const en = items.map(p=>({ p, keys:nutKeysOf(p.name) }));
  const out = [], seen = {};
  for(let i=0;i<en.length;i++){ for(let j=i+1;j<en.length;j++){
    for(const k1 of en[i].keys){ for(const k2 of en[j].keys){
      const note = conflictNote(k1,k2);
      if(note){
        const sig = en[i].p.id+'|'+en[j].p.id;
        if(seen[sig]) continue; seen[sig]=1;
        out.push({ a:en[i].p.name, b:en[j].p.name, note });
      }
    }}
  }}
  return out;
}
function allPlanConflicts(){
  const en = state.plan.map(p=>({ p, keys:nutKeysOf(p.name) }));
  const out = [], seen = {};
  for(let i=0;i<en.length;i++){ for(let j=i+1;j<en.length;j++){
    for(const k1 of en[i].keys){ for(const k2 of en[j].keys){
      const note = conflictNote(k1,k2); if(!note) continue;
      const sig = en[i].p.id+'|'+en[j].p.id; if(seen[sig]) continue; seen[sig]=1;
      const shared = (en[i].p.slots||[]).filter(s=>(en[j].p.slots||[]).includes(s)).map(s=>SLOT_LABEL[s]);
      out.push({ where: shared.length ? shared.join(', ')+': ' : '', a:en[i].p.name, b:en[j].p.name, note });
    }}
  }}
  return out;
}

/* ═══ HILFSFUNKTIONEN ═══ */
function uid(){ return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function pad(n){ return n<10?'0'+n:''+n; }
function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayKey(){ return dateKey(new Date()); }
function langDatum(d){
  const wt=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const mo=['Jan.','Feb.','März','Apr.','Mai','Juni','Juli','Aug.','Sep.','Okt.','Nov.','Dez.'];
  return wt[d.getDay()]+', '+d.getDate()+'. '+mo[d.getMonth()];
}

/* ═══ STATE ═══ */
function normalizeState(st){
  if(!st || typeof st!=="object"){ st = { plan:[], log:{}, seeded:true }; }
  if(!Array.isArray(st.plan)) st.plan = [];
  st.seeded = true;
  if(!Array.isArray(st.meds)) st.meds = [];
  if(typeof st.medsFree !== "string") st.medsFree = "";
  if(!st.log || typeof st.log !== "object") st.log = {};
  st.plan.forEach(p=>{ if(p && p.note){ const c=p.note.replace(/\s*·?\s*⚠\s*mit Arzt\/Apotheke (?:abkl[aä]ren|kl[aä]ren)[\s\S]*$/,"").trim(); if(c!==p.note) p.note=c; } });
  if(!st.demoCleared){
    const demoSig = ['Vitamin D3 + K2|4000 IE|zur Mahlzeit mit Fett','Omega-3|2 Kapseln|zum Essen','Magnesium|300 mg|entspannend, abends gut'];
    st.plan = st.plan.filter(p=> demoSig.indexOf((p.name||'')+'|'+(p.dose||'')+'|'+(p.note||'')) < 0 );
    st.demoCleared = true;
  }
  return st;
}
let state = normalizeState(load());
save();

let mode = 'heute';
let editing = null;
let formSlots = [];

const content = document.getElementById('content');
const headTitel = document.getElementById('headTitel');

/* ═══ HEUTE ═══ */
function logKey(itemId, slot){ return itemId+'|'+slot; }
function isDone(itemId, slot){ const t=state.log[todayKey()]; return !!(t && t[logKey(itemId,slot)]); }
function toggleDone(itemId, slot){
  const tk = todayKey();
  if(!state.log[tk]) state.log[tk] = {};
  const k = logKey(itemId,slot);
  if(state.log[tk][k]) delete state.log[tk][k];
  else state.log[tk][k] = true;
  save();
}
function todayItems(){
  const out = [];
  SLOTS.forEach(sl=>{ state.plan.forEach(p=>{ if(p.slots && p.slots.includes(sl.id)) out.push({ p, slot:sl.id }); }); });
  return out;
}

function renderHeute(){
  headTitel.textContent = 'Supplemente · Heute';
  const items = todayItems();
  if(items.length===0){
    content.innerHTML = `<p class="datum">${esc(langDatum(new Date()))}</p>
      <div class="empty"><div class="big">💊</div>
      <p>Noch keine Supplemente im Plan.<br>Lege im Reiter <b>Plan</b> an, was du nimmst – dann erscheint es hier zum Abhaken.</p></div>`;
    return;
  }
  const total = items.length;
  const done = items.filter(it=>isDone(it.p.id, it.slot)).length;
  const pct = Math.round(done/total*100);

  let html = `<p class="datum">${esc(langDatum(new Date()))}</p>`;
  html += `<div class="progress-wrap">
    <div class="progress-top"><span class="zahl">${done} von ${total} erledigt</span><span class="lbl">${pct}%</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    ${done===total ? '<div class="alldone">✓ Alles für heute genommen – stark!</div>' : ''}
  </div>`;

  html += medBanner();
  SLOTS.forEach(sl=>{
    const slotItems = state.plan.filter(p=>p.slots && p.slots.includes(sl.id));
    if(slotItems.length===0) return;
    html += `<div class="slot"><div class="slot-head">
      <span class="ic">${sl.ic}</span><span class="name">${sl.label}</span>
      <span class="hint">· ${sl.hint}</span></div>`;
    slotConflicts(slotItems).forEach(c=>{
      html += `<div class="warn"><span class="wic">⚠️</span><span><b>${esc(c.a)} + ${esc(c.b)}</b><span class="wtx">${esc(c.note)}</span></span></div>`;
    });
    slotItems.forEach(p=>{
      const d = isDone(p.id, sl.id);
      html += `<div class="item ${d?'done':''}" data-id="${p.id}" data-slot="${sl.id}">
        <div class="check">${d?'✓':''}</div>
        <div class="nm">${esc(p.name)}</div>
        <div class="ds">${esc(p.dose||'')}</div>
        ${p.note?`<div class="nt">${esc(p.note)}</div>`:''}
        ${medItemWarnHtml(p.name)}
      </div>`;
    });
    html += `</div>`;
  });

  html += `<div class="mini-actions"><button class="reset-day" id="resetDay">Heute zurücksetzen</button></div>`;
  content.innerHTML = html;

  content.querySelectorAll('.item').forEach(el=>{
    el.onclick = ()=>{ toggleDone(el.dataset.id, el.dataset.slot); renderHeute(); };
  });
  const rb = document.getElementById('resetDay');
  rb.onclick = ()=>{
    let ok=true; try{ ok = window.confirm('Alle Häkchen von heute zurücksetzen?'); }catch(e){ ok=true; }
    if(ok){ if(!state.log) state.log={}; delete state.log[todayKey()]; save(); renderHeute(); }
  };
}

function renderPlan(){
  headTitel.textContent = 'Supplemente · Plan';
  let html = `<p class="plan-intro">Hier verwaltest du, was du nimmst. Tippe auf <b>Bearbeiten</b> oder lege unten ein neues Supplement an.</p>`;
  html += medBanner();
  allPlanConflicts().forEach(c=>{
    html += `<div class="warn"><span class="wic">⚠️</span><span><b>${esc(c.where)}${esc(c.a)} + ${esc(c.b)}</b><span class="wtx">${esc(c.note)}</span></span></div>`;
  });
  if(editing){ html += planForm(); }

  if(state.plan.length===0 && !editing){
    html += `<div class="empty"><div class="big">📋</div><p>Dein Plan ist noch leer.</p></div>`;
  } else {
    state.plan.forEach(p=>{
      const slots = (p.slots||[]).map(s=>`<span class="pi-slot">${SLOT_LABEL[s]||s}</span>`).join('');
      html += `<div class="plan-item">
        <div class="pi-name">${esc(p.name)}</div>
        <div class="pi-dose">${esc(p.dose||'')}</div>
        <div class="pi-slots">${slots||'<span class="pi-slot" style="background:#f0e0e0;color:#b23030">keine Tageszeit</span>'}</div>
        ${p.note?`<div class="pi-note">${esc(p.note)}</div>`:''}
        ${medItemWarnHtml(p.name)}
        <button class="pi-edit" data-edit="${p.id}">Bearbeiten</button>
      </div>`;
    });
  }
  if(!editing){ html += `<button class="add-btn" id="addBtn">＋ Supplement hinzufügen</button>`; }
  if(!editing && state.plan.length){ html += `<button class="a-btn2" id="pdfBtn" style="width:100%;margin-top:0.5rem;">📄 Plan als PDF / senden</button>`; }
  content.innerHTML = html;
  bindPlan();
}

function planForm(){
  const e = editing==='new' ? {name:'',dose:'',slots:[],note:''} : state.plan.find(p=>p.id===editing);
  if(editing!=='new') formSlots = [...(e.slots||[])];
  const slotOpts = SLOTS.map(s=>`<div class="slot-opt ${formSlots.includes(s.id)?'on':''}" data-slot="${s.id}">${s.label}</div>`).join('');
  return `<div class="form">
    <h3>${editing==='new'?'Neues Supplement':'Supplement bearbeiten'}</h3>
    <div class="field"><label>Name</label><input id="f-name" type="text" value="${esc(e.name)}" placeholder="z. B. Magnesium"></div>
    <div class="field"><label>Dosis</label><input id="f-dose" type="text" value="${esc(e.dose)}" placeholder="z. B. 300 mg oder 2 Kapseln"></div>
    <div class="field"><label>Wann einnehmen?</label><div class="slot-pick">${slotOpts}</div></div>
    <div class="field"><label>Notiz (optional)</label><input id="f-note" type="text" value="${esc(e.note)}" placeholder="z. B. zum Essen, nüchtern …"></div>
    <div class="form-actions">
      <button class="btn save" id="f-save">Speichern</button>
      <button class="btn cancel" id="f-cancel">Abbrechen</button>
      ${editing!=='new'?'<button class="btn del" id="f-del">Löschen</button>':''}
    </div></div>`;
}

function bindPlan(){
  const addBtn = document.getElementById('addBtn');
  if(addBtn) addBtn.onclick = ()=>{ editing='new'; formSlots=[]; renderPlan(); window.scrollTo({top:0,behavior:'smooth'}); };
  const pdfBtn = document.getElementById('pdfBtn');
  if(pdfBtn) pdfBtn.onclick = printPlan;

  content.querySelectorAll('[data-edit]').forEach(b=>{
    b.onclick = ()=>{ editing=b.dataset.edit; const p=state.plan.find(x=>x.id===editing); formSlots=[...(p.slots||[])]; renderPlan(); window.scrollTo({top:0,behavior:'smooth'}); };
  });

  content.querySelectorAll('.slot-opt').forEach(o=>{
    o.onclick = ()=>{
      const s=o.dataset.slot;
      if(formSlots.includes(s)) formSlots=formSlots.filter(x=>x!==s);
      else formSlots.push(s);
      o.classList.toggle('on');
    };
  });

  const sv = document.getElementById('f-save');
  if(sv) sv.onclick = ()=>{
    const name=document.getElementById('f-name').value.trim();
    const dose=document.getElementById('f-dose').value.trim();
    const note=document.getElementById('f-note').value.trim();
    if(!name){ alert('Bitte einen Namen eingeben.'); return; }
    if(formSlots.length===0){ alert('Bitte mindestens eine Tageszeit wählen.'); return; }
    const ordered = SLOTS.map(s=>s.id).filter(id=>formSlots.includes(id));
    if(editing==='new'){ state.plan.push({ id:uid(), name, dose, slots:ordered, note }); }
    else { const p=state.plan.find(x=>x.id===editing); p.name=name; p.dose=dose; p.slots=ordered; p.note=note; }
    save(); editing=null; renderPlan();
  };

  const cn = document.getElementById('f-cancel');
  if(cn) cn.onclick = ()=>{ editing=null; renderPlan(); };

  const dl = document.getElementById('f-del');
  if(dl){ let armedD=false; dl.onclick = ()=>{
    if(!armedD){ armedD=true; dl.textContent='Wirklich?'; setTimeout(()=>{ armedD=false; dl.textContent='Löschen'; }, 3000); return; }
    state.plan = state.plan.filter(x=>x.id!==editing);
    save(); editing=null; renderPlan();
  }; }
}

/* ═══ VERLAUF ═══ */
function renderVerlauf(){
  headTitel.textContent = 'Supplemente · Verlauf';
  const total = todayItems().length;
  let html = `<p class="verlauf-intro">Die letzten 14 Tage – wie viel du jeweils genommen hast (gemessen an deinem aktuellen Plan${total?'':', der gerade leer ist'}).</p>`;

  if(total===0){
    html += `<div class="empty"><div class="big">📅</div><p>Sobald du Supplemente im Plan hast und abhakst, füllt sich hier dein Verlauf.</p></div>`;
    content.innerHTML = html; return;
  }

  const now = new Date();
  for(let i=0;i<14;i++){
    const d = new Date(now); d.setDate(now.getDate()-i);
    const tk = dateKey(d);
    const log = state.log[tk] || {};
    const done = Object.keys(log).length;
    const pct = Math.min(100, Math.round(done/total*100));
    const isToday = (i===0);
    const label = isToday ? 'Heute' : langDatum(d).split(',')[0]+' '+d.getDate()+'.';
    html += `<div class="vrow">
      <div class="vday ${isToday?'heute':''}">${esc(label)}</div>
      <div class="vbar ${pct>=100?'full':''}"><span style="width:${pct}%"></span></div>
      <div class="vnum">${Math.min(done,total)}/${total}</div>
    </div>`;
  }
  content.innerHTML = html;
}

function aSchedule(keys){
  const place = {};
  keys.forEach(k=> place[k] = CAT[k].slot);
  for(let pass=0; pass<4; pass++){
    let moved=false;
    for(let i=0;i<keys.length;i++){ for(let j=i+1;j<keys.length;j++){
      const a=keys[i], b=keys[j], ca=CAT[a].ck, cb=CAT[b].ck;
      if(ca && cb && place[a]===place[b] && conflictNote(ca,cb)){
        const mv=b;
        const tries=[CAT[mv].slot].concat(CAT[mv].alt||[]).concat(SLOTS.map(x=>x.id));
        for(const sl of tries){
          if(sl===place[a]) continue;
          let ok=true;
          for(const k2 of keys){ if(k2===mv) continue;
            if(place[k2]===sl && CAT[k2].ck && CAT[mv].ck && conflictNote(CAT[k2].ck,CAT[mv].ck)){ ok=false; break; } }
          if(ok){ place[mv]=sl; moved=true; break; }
        }
      }
    }}
    if(!moved) break;
  }
  return place;
}

function aScore(){
  const score={}, reason={}, suppress={};
  const add=(k,w,why)=>{ if(!k || suppress[k]) return; score[k]=(score[k]||0)+w; (reason[k]=reason[k]||[]).push(why); };
  aSel.forEach(i=>{ const sy=SYMPTOMS_A[i]; sy.def.forEach(d=> add(d.n, A_W[d.s], sy.name)); });
  const blood=[];
  BLOOD_TESTS.forEach(b=>{
    const raw=aBlood[b.key]; if(raw==null || raw==="") return;
    const v=parseFloat(String(raw).replace(",",".")); if(isNaN(v)) return;
    let st="ok";
    if(b.low!=null && v < b.low) st="tief";
    else if(b.high!=null && v > b.high) st="hoch";
    blood.push({label:b.label, unit:b.unit, val:v, status:st, nut:b.nut||null});
    if(b.nut){
      if(st==="tief"){ add(b.nut, 5, "Blutwert "+b.label+" tief"); }
      if(st==="hoch"){ suppress[b.nut]=true; delete score[b.nut]; }
    }
    if(b.key==="homocystein" && st==="hoch"){ add("b12",4,"Homocystein erhöht"); add("folsaeure",4,"Homocystein erhöht"); add("b6",3,"Homocystein erhöht"); }
  });
  let keys=Object.keys(score).filter(k=>!suppress[k] && score[k]>=2 && CAT[k]);
  keys.sort((a,b)=> score[b]-score[a] || CAT[a].name.localeCompare(CAT[b].name,"de"));
  keys=keys.slice(0,14);
  const place=aSchedule(keys);
  const confl=[];
  for(let i=0;i<keys.length;i++){ for(let j=i+1;j<keys.length;j++){
    const a=keys[i], b=keys[j], ca=CAT[a].ck, cb=CAT[b].ck;
    if(ca && cb && place[a]===place[b]){ const n=conflictNote(ca,cb); if(n) confl.push({a:CAT[a].name,b:CAT[b].name,slot:place[a],note:n}); }
  }}
  const recs=keys.map(k=>({key:k, name:CAT[k].name, slot:place[k], score:score[k], reason:(reason[k]||[]), note:CAT[k].note}));
  return {recs, blood, confl};
}

function aParseReport(text){
  let found=0;
  BLOOD_TESTS.forEach(b=>{
    for(const rx of b.rx){ const m=text.match(rx); if(m && m[1]){ aBlood[b.key]=m[1].replace(",","."); const el=document.getElementById("bl_"+b.key); if(el) el.value=aBlood[b.key]; found++; break; } }
  });
  return found;
}

/* PDF-Import: pdf.js (v3 UMD) bei Bedarf vom CDN nachladen und Textebene auslesen. */
let _pdfLib = null;
function loadPdfLib(){
  if(window.pdfjsLib){ return Promise.resolve(window.pdfjsLib); }
  if(_pdfLib){ return _pdfLib; }
  _pdfLib = new Promise((res,rej)=>{
    const sc=document.createElement("script");
    sc.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    sc.onload=()=>{ try{ window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; res(window.pdfjsLib); }catch(e){ rej(e); } };
    sc.onerror=()=>rej(new Error("pdf.js konnte nicht geladen werden"));
    document.head.appendChild(sc);
  });
  return _pdfLib;
}
function aInfo(html, kind){
  const bg=kind==="ok"?"#E6F6EC":(kind==="warn"?"#FFF1D6":"#eef6fd");
  const bd=kind==="ok"?"#b7e3c6":(kind==="warn"?"#e8c886":"#bcdcf6");
  const tx=kind==="ok"?"#256b3b":(kind==="warn"?"#a86b00":"#1565C0");
  const box=document.getElementById("aResult");
  if(box) box.innerHTML='<div class="a-note" style="background:'+bg+';border-color:'+bd+';color:'+tx+'">'+html+'</div>';
}
async function aImportPdf(file){
  aInfo("📑 PDF wird gelesen …");
  try{
    const lib=await loadPdfLib();
    const buf=await file.arrayBuffer();
    const pdf=await lib.getDocument({data:buf}).promise;
    let text="";
    for(let i=1;i<=pdf.numPages;i++){ const pg=await pdf.getPage(i); const tc=await pg.getTextContent(); text+=tc.items.map(it=>it.str).join(" ")+"\n"; }
    if(text.replace(/\s/g,"").length<10){
      aInfo("Im PDF wurde kein Text gefunden – das ist vermutlich ein Scan oder Foto. Schick es mir bitte direkt im Chat, dann lese ich die Werte für dich raus.","warn");
      return;
    }
    const pasteEl=document.getElementById("aPaste"); if(pasteEl) pasteEl.value=text;
    const n=aParseReport(text);
    if(n){ aInfo("✓ "+n+" Wert"+(n>1?"e":"")+" aus dem PDF gelesen und unten eingetragen – bitte kurz prüfen, dann „Analysieren“.","ok"); }
    else { aInfo("PDF gelesen, aber keine Standardwerte erkannt. Der Text steht oben im Feld – prüf ihn von Hand oder schick mir das PDF im Chat.","warn"); }
  }catch(e){
    aInfo("PDF konnte nicht gelesen werden (evtl. offline oder ein reiner Scan). Schick es mir im Chat, dann lese ich die Werte raus.","warn");
  }
}

  aMed = new Set(state.meds||[]); aMedFree = state.medsFree||"";
  let h = '<div class="a-note">⚕️ Diese Auswertung ist eine Orientierungshilfe und ersetzt keine ärztliche Abklärung. Blutwerte und ihre Deutung gehören in fachliche Hände.</div>';
  h += '<div class="a-sec"><div class="a-h">1 · Beschwerden – tippe an, was zutrifft</div><div class="a-chips">';
  SYMPTOMS_A.forEach((sy,i)=>{ h += '<span class="a-chip'+(aSel.has(i)?' sel':'')+'" data-sym="'+i+'">'+esc(sy.name)+'</span>'; });
  h += '</div></div>';
  h += '<div class="a-sec"><div class="a-h">2 · Blutbild</div>';
  h += '<div class="a-sub">Ganzen Laborbericht einfügen oder als Text-PDF importieren – die App erkennt automatisch viele Werte (Eisenstatus, Vitamine, Mineralien, Schilddrüse, Leber, Niere, Fette …). Die supplement-relevanten kannst du unten von Hand korrigieren. Referenzbereiche sind Richtwerte und können je nach Labor abweichen.</div>';
  h += '<textarea class="bl-paste" id="aPaste" rows="4" placeholder="z. B. Ferritin 23 µg/l (30–300)\nVitamin D 48 nmol/l\nZink 9.5 µmol/l ..."></textarea>';
  h += '<label class="a-btn2 file" id="aPdfBtn" style="width:100%;margin:0 0 0.45rem;"><input type="file" id="aPdf" accept="application/pdf,.pdf" hidden>📑 PDF importieren</label>';
  h += '<div class="a-btn-row"><button class="a-btn2" id="aParse">⤵ Text auslesen</button><label class="a-btn2 file"><input type="file" id="aFile" accept=".txt,.csv,text/plain" hidden>📄 Textdatei</label></div>';
  const _grps={}; BLOOD_TESTS.filter(b=>b.field).forEach(b=>{ (_grps[b.grp]=_grps[b.grp]||[]).push(b); });
  Object.keys(_grps).forEach(g=>{
    h += '<div class="bl-grp">'+esc(g)+'</div><div class="blood-grid">';
    _grps[g].forEach(b=>{ const val=(aBlood[b.key]!=null?aBlood[b.key]:""); h += '<div class="bl-row"><span class="bl-lab">'+esc(b.label)+'</span><input class="bl-in" id="bl_'+b.key+'" inputmode="decimal" placeholder="–" value="'+esc(String(val))+'"><span class="bl-un">'+esc(b.unit)+'</span></div>'; });
    h += '</div>';
  });
  h += '</div><div class="bl-hint">📑 Text-PDF wird automatisch ausgelesen (Internet nötig). Ein Foto oder eingescanntes PDF ohne Textebene kann die App nicht lesen – das schickst du mir am besten direkt im Chat, dann nenne ich dir die Werte zum Eintragen. Vitamin D in nmol/l (ng/ml × 2,5 = nmol/l).</div></div>';
  h += '<div class="a-sec"><div class="a-h">3 · Medikamente / Vorerkrankungen</div>';
  h += '<div class="a-sub">Wichtig für die Sicherheit. Bei Medikamenten prüft die App auf bekannte Wechselwirkungen und warnt – bei Hochrisiko (z. B. Transplantat, Clozapin) füllt sie bewusst keinen Plan automatisch. Ersetzt keine Abklärung durch Arzt/Apotheke.</div>';
  h += '<div class="a-chips">';
  MED_CATS.forEach((m,i)=>{ h += '<span class="a-chip med'+(aMed.has(i)?" sel":"")+'" data-med="'+i+'">'+esc(m.label)+'</span>'; });
  h += '</div>';
  h += '<input class="bl-paste" id="aMedFree" style="margin-top:0.5rem;" placeholder="weitere Medikamente (Freitext, optional)" value="'+esc(aMedFree)+'">';
  h += '</div>';
  h += '<button class="add-btn" id="aRun">🔍 Analysieren</button>';
  h += '<div id="aResult"></div>';
  content.innerHTML = h;
  content.querySelectorAll(".a-chip[data-sym]").forEach(c=>{ c.onclick=()=>{ const i=+c.dataset.sym; if(aSel.has(i)){ aSel.delete(i); c.classList.remove("sel"); } else { aSel.add(i); c.classList.add("sel"); } }; });
  content.querySelectorAll(".a-chip[data-med]").forEach(c=>{ c.onclick=()=>{ const i=+c.dataset.med; if(aMed.has(i)){ aMed.delete(i); c.classList.remove("sel"); } else { aMed.add(i); c.classList.add("sel"); } state.meds=[...aMed]; save(); }; });
  document.getElementById("aParse").onclick = ()=>{
    const txt=document.getElementById("aPaste").value||""; const n=aParseReport(txt);
    const box=document.getElementById("aResult");
    box.innerHTML = '<div class="a-note" style="background:'+(n?'#E6F6EC':'#FFF1D6')+';border-color:'+(n?'#b7e3c6':'#e8c886')+';color:'+(n?'#256b3b':'#a86b00')+'">'+(n? '✓ '+n+' Wert'+(n>1?'e':'')+' erkannt und unten eingetragen – bitte kurz prüfen.' : 'Keine Werte erkannt. Trag sie bitte unten von Hand ein oder schick mir das Blutbild im Chat.')+'</div>';
  };
  document.getElementById("aFile").onchange = (e)=>{
    const f=e.target.files && e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ document.getElementById("aPaste").value=String(r.result||""); }; r.readAsText(f);
  };
  document.getElementById("aPdf").onchange = (e)=>{ const f=e.target.files && e.target.files[0]; if(f) aImportPdf(f); e.target.value=""; };
  document.getElementById("aRun").onclick = aRunAnalysis;
}

function aRunAnalysis(){
  const _pe=document.getElementById("aPaste"); if(_pe && _pe.value.trim()){ aParseReport(_pe.value); }
  BLOOD_TESTS.forEach(b=>{ const el=document.getElementById("bl_"+b.key); if(el){ const v=el.value.trim(); aBlood[b.key]= (v===""?null:v); } });
  const mf=document.getElementById("aMedFree"); if(mf) aMedFree=mf.value.trim();
  state.meds=[...aMed]; state.medsFree=aMedFree; save();
  const res = aScore();
  const med = aMedEval();
  let h="";
  if(med.block.length){
    h += '<div class="a-danger"><b>⚠ Stopp – kein automatischer Plan</b><br>Wegen: '+med.block.map(m=>esc(m.label)).join(", ")+'. '+med.block.map(m=>esc(m.note)).join(" ")+' Jede Ergänzung individuell mit dem Behandlungsteam abklären – die App füllt hier bewusst nichts automatisch.</div>';
  }
  if(med.caution.length){
    h += '<div class="warn"><span class="wic">⚠️</span><span><b>Wechselwirkungen mit Medikamenten beachten</b><span class="wtx">'+med.caution.map(m=>esc(m.label)+": "+esc(m.note)).join("  ")+'</span></span></div>';
  }
  if(res.blood.length){
    h += '<div class="a-sec"><div class="a-h">Blutwerte</div>';
    res.blood.forEach(b=>{ const cls=b.status==="tief"?"bf-low":(b.status==="hoch"?"bf-high":"bf-ok"); const tag=b.status==="tief"?"tief":(b.status==="hoch"?"hoch":"im Zielbereich");
      h += '<div class="bf '+cls+'"><span>'+esc(b.label)+': <b>'+b.val+" "+esc(b.unit)+'</b></span><span class="bf-tag">'+tag+'</span></div>'; });
    if(res.blood.some(b=>!b.nut && b.status!=="ok")){ h += '<div class="bl-hint">Werte ausserhalb des Bereichs ohne direkten Supplement-Bezug (z. B. Leber, Niere, Schilddrüse) bitte ärztlich einordnen lassen.</div>'; }
    h += '</div>';
  }
  if(!res.recs.length){
    h += '<div class="empty"><div class="big">🤔</div><p>Noch keine klare Empfehlung – wähle ein paar Beschwerden oder trage Blutwerte ein.</p></div>';
    document.getElementById("aResult").innerHTML=h; return;
  }
  h += '<div class="a-sec"><div class="a-h">Empfehlung & Zeitplan</div>';
  SLOTS.forEach(sl=>{ const inSlot=res.recs.filter(r=>r.slot===sl.id); if(!inSlot.length) return;
    h += '<div class="rec-slot"><div class="rec-slot-h">'+sl.ic+" "+sl.label+'</div>';
    inSlot.forEach(r=>{ const why=(r.note? r.note+" · ":"")+"wegen: "+r.reason.slice(0,3).join(", ");
      const aff=med.affected[r.key]; const flagged = med.block.length>0 || aff;
      h += '<div class="rec'+(flagged?" flag":"")+'"><div class="rec-nm">'+esc(r.name)+(flagged?' <span class="rec-warn">⚠ abklären</span>':"")+'</div><div class="rec-why">'+esc(why)+'</div>'+(aff?'<div class="rec-warn2">⚠ Wechselwirkung: '+esc(aff.join("; "))+'</div>':"")+'</div>'; });
    h += '</div>'; });
  h += '</div>';
  if(res.confl.length){ res.confl.forEach(c=>{ h += '<div class="warn"><span class="wic">⚠️</span><span><b>'+esc(c.a)+" + "+esc(c.b)+" ("+esc(SLOT_LABEL[c.slot])+')</b><span class="wtx">'+esc(c.note)+' Wenn möglich auf verschiedene Zeiten legen.</span></span></div>'; }); }
  if(!med.block.length){ h += '<button class="add-btn" id="aApply">✓ In den Plan übernehmen</button>'; }
  else { h += '<div class="a-danger">Kein automatisches Befüllen bei diesen Medikamenten/Erkrankungen. Schick die Zusammenfassung unten ans Behandlungsteam.</div>'; }
  h += '<div class="a-btn-row"><button class="a-btn2" id="aCopy">📋 Zusammenfassung kopieren (Claude / Behandlungsteam)</button></div>';
  const box=document.getElementById("aResult"); box.innerHTML=h;
  const ab=document.getElementById("aApply"); if(ab) ab.onclick = ()=> aApply(res.recs, med.affected);
  document.getElementById("aCopy").onclick = ()=> aCopySummary(res, med);
  box.scrollIntoView({behavior:"smooth", block:"start"});
}

function aApply(recs, affected){
  affected=affected||{};
  recs.forEach(r=>{
    const nm=CAT[r.key].name, ck=CAT[r.key].ck;
    const note=r.note||"";
    let ex = state.plan.find(p=> p.name.toLowerCase()===nm.toLowerCase() || (ck && nutKeysOf(p.name).indexOf(ck)>=0));
    if(ex){ ex.slots=[r.slot]; if(note) ex.note=note; }
    else { state.plan.push({ id:uid(), name:nm, dose:"", slots:[r.slot], note:note }); }
  });
  save();
  mode="plan";
  document.querySelectorAll(".tab").forEach(x=> x.classList.toggle("active", x.dataset.mode==="plan"));
  render();
  window.scrollTo({top:0, behavior:"smooth"});
}

function aCopySummary(res, med){
  med=med||{block:[],caution:[]};
  let t="Bioenergetische Frequenzarbeit – Analyse-Zusammenfassung\n\n";
  const syms=[...aSel].map(i=>SYMPTOMS_A[i].name);
  t+="Beschwerden: "+(syms.length?syms.join(", "):"keine angegeben")+"\n\n";
  const meds=[...aMed].map(i=>MED_CATS[i].label);
  t+="Medikamente / Vorerkrankungen: "+(meds.length?meds.join(", "):"keine angegeben")+(aMedFree?(" | weitere: "+aMedFree):"")+"\n\n";
  t+="Blutwerte:\n";
  if(res.blood.length){ res.blood.forEach(b=>{ t+=" - "+b.label+": "+b.val+" "+b.unit+" ("+(b.status==="ok"?"im Zielbereich":b.status)+")\n"; }); }
  else { t+=" - keine eingetragen\n"; }
  t+="\nApp-Empfehlung"+((med.block&&med.block.length)?" (NICHT automatisch uebernommen wegen Medikamenten)":"")+":\n";
  SLOTS.forEach(sl=>{ const r=res.recs.filter(x=>x.slot===sl.id); if(r.length) t+=" "+sl.label+": "+r.map(x=>x.name).join(", ")+"\n"; });
  const flags=[...(med.block||[]),...(med.caution||[])];
  if(flags.length){ t+="\n⚠ Supplement-Medikamenten-Wechselwirkungen prüfen wegen: "+flags.map(m=>m.label).join(", ")+"\n"; }
  t+="\nBitte ärztlich gegenprüfen, besonders die Wechselwirkungen mit Medikamenten.";
  const done=()=>{ const el=document.getElementById("aCopy"); if(el){ el.textContent="✓ Kopiert – einfügen"; } };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(done).catch(()=>window.prompt("Markieren & kopieren:", t)); }
  else { window.prompt("Markieren & kopieren:", t); }
}

/* ═══ NAVIGATION ═══ */
function render(){
  if(mode==='heute') renderHeute();
  else if(mode==='plan') renderPlan();
  else if(mode==='analyse') renderAnalyse();
  else renderVerlauf();
}
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    mode = t.dataset.mode; editing = null; render();
    window.scrollTo({top:0,behavior:'smooth'});
  };
});


render();

/* ═══ PWA Service Worker ═══ */
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
  });
}
</script>
